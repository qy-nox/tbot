<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TBot Admin</title>
  <link rel="stylesheet" href="/static/admin_style.css" />
</head>
<body>
  <header>
    <h1>TBot Admin Dashboard</h1>
    <div class="auth">
      <input id="tokenInput" type="password" placeholder="Bearer token (admin)" />
      <button id="refreshBtn">Refresh</button>
    </div>
  </header>
  <main>
    <section class="cards">
      <article><h2>Total Users</h2><p id="totalUsers">-</p></article>
      <article><h2>Premium + VIP</h2><p id="paidUsers">-</p></article>
      <article><h2>Signals Today</h2><p id="signalsToday">-</p></article>
      <article><h2>Revenue</h2><p id="revenue">-</p></article>
    </section>
    <section>
      <h2>Users</h2>
      <pre id="usersBox">Load data to view users…</pre>
    </section>
    <section>
      <h2>System Overview</h2>
      <pre id="paymentsBox">Load data to view overview…</pre>
    </section>
  </main>
  <script src="/static/admin_script.js"></script>
</body>
</html>
